<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix Japanese</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="header">
    <span class="title">Netflix Japanese <span class="version">v1.1</span></span>
    <span id="current-speed" class="current-speed">1.0x</span>
  </div>

  <!-- Fine-grained slow section -->
  <div class="section-label">🐢 Slow — Language Learning</div>
  <div class="btn-grid slow-grid">
    <button data-speed="0.25">0.25</button>
    <button data-speed="0.30">0.30</button>
    <button data-speed="0.40">0.40</button>
    <button data-speed="0.50">0.50</button>
    <button data-speed="0.55">0.55</button>
    <button data-speed="0.60">0.60</button>
    <button data-speed="0.65">0.65</button>
    <button data-speed="0.70">0.70</button>
    <button data-speed="0.75">0.75</button>
    <button data-speed="0.80">0.80</button>
    <button data-speed="0.85">0.85</button>
    <button data-speed="0.90">0.90</button>
    <button data-speed="0.95">0.95</button>
    <button data-speed="1.00">1.00</button>
  </div>

  <!-- Fast section -->
  <div class="section-label">⚡ Fast</div>
  <div class="btn-grid fast-grid">
    <button data-speed="1.25">1.25</button>
    <button data-speed="1.50">1.50</button>
    <button data-speed="1.75">1.75</button>
    <button data-speed="2.00">2.00</button>
  </div>

  <!-- Nudge controls -->
  <div class="nudge-row">
    <button id="nudge-down" class="nudge-btn" title="[">− 0.05</button>
    <button id="reset-btn" class="reset-btn" title="⌥+0">Reset 1×</button>
    <button id="nudge-up" class="nudge-btn" title="]">+ 0.05</button>
  </div>

  <div class="shortcuts-hint">Speed: [ · ]  &nbsp;|&nbsp;  ±1s: , · .  &nbsp;|&nbsp;  Reset: ⌥+0</div>

  <script src="js/popup.js"></script>
</body>
</html>
